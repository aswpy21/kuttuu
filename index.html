<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Winter Surprise Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- The Surprise Overlay Screen -->
    <div id="surprise-overlay" class="overlay">
        <div class="overlay-card">
            <div class="gift-icon">🎁</div>
            <h2>You have a secret message!</h2>
            <p>Open the surprise, then use your finger to carve into the snow and reveal what's underneath.</p>
            <button id="open-btn" class="cta-button">Open Surprise ✨</button>
        </div>
    </div>

    <!-- Hidden Background Audio -->
    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- The Hidden Content Underneath the Snow -->
    <main id="main-content" class="container blurred">
        <section class="hero-section">
            <h1 class="gradient-text">Happy Birthday, Name!</h1>
        </section>

        <!-- The hidden surprise photo -->
        <div class="reveal-wrapper">
            <img src="20260623_145849.jpg" alt="Our Favorite Memory" class="revealed-img">
        </div>
        
        <footer class="footer">
            <p>Made with 🤍</p>
        </footer>
    </main>

    <!-- Full-screen Snow Layers -->
    <canvas id="snow-canvas"></canvas>
    <div id="blizzard-env"></div>

    <script src="script.js"></script>
</body>
</html>
